# EchoFM Attentive Probe Evaluation Configuration
# Example configuration for training attentive probes on EchoFM

# Experiment metadata
eval_name: attentive_probe_eval_multiclip
tag: echofm-base-4class-probe  # Experiment tag for logging
folder: ./experiments/multiclip-attentive/            # Output folder for checkpoints and logs
num_workers: 8
resume_checkpoint: false

# Experiment configuration
experiment:
  classifier:
    # Probe type: 'attentive' or 'linear'
    probe_type: attentive
    # Attention heads for attentive probe
    num_heads: 16
    # Number of transformer blocks in attentive probe
    num_probe_blocks: 4

  data:
    # Dataset configuration
    dataset_type: VideoDataset

    # Paths to training and validation datasets
    # Supports both CSV files and folder paths
    # CSV format: path/to/video.mp4,label[,patient_id]
    # If patient_id is present in the 3rd column, subject-level validation accuracy is computed.
    dataset_train: /system/user/publicwork/fallmann/miracle/miracle/data/server/train_val_4class.csv
    dataset_val:  /system/user/publicwork/fallmann/miracle/miracle/data/server/test_4class.csv

    # Number of classification classes
    num_classes: 4

    # Video sampling parameters
    resolution: 224              # Input image resolution
    frames_per_clip: 32          # Frames per video clip
    num_clips: 4                 # Number of clips per video (1 = single clip, >1 = multiclip)
    frame_step: 1                # Step between consecutive frames
    num_segments: 1              # Number of temporal segments
    num_views_per_segment: 1     # Spatial views per segment
    # Multiclip-specific options (only used when num_clips > 1):
    # allow_clip_overlap: false   # Allow overlapping clips for short videos
    # random_clip_sampling: true   # Randomise clip start positions within segments
    # filter_short_videos: false   # Skip videos shorter than required span
    # use_temporal_pos_embed: false  # Add temporal positional embedding to clip tokens
    # max_frames: 256              # Max frames buffer for temporal pos embed

  optimization:
    batch_size: 12
    num_epochs: 20
    use_bfloat16: false          # Use mixed precision training

    # Hyperparameter grid: train multiple probes with different settings
    # Useful for finding optimal hyperparameters
    multihead_kwargs:
      - final_lr: 0.0
        final_weight_decay: 0.01
        lr: 0.001
        start_lr: 0.001
        warmup: 0.0
        weight_decay: 0.01
      - final_lr: 0.0
        final_weight_decay: 0.1
        lr: 0.001
        start_lr: 0.001
        warmup: 0.0
        weight_decay: 0.1
      - final_lr: 0.0
        final_weight_decay: 0.4
        lr: 0.001
        start_lr: 0.001
        warmup: 0.0
        weight_decay: 0.4

      # --- Group 2: 5e-4 ---
      - final_lr: 0.0
        final_weight_decay: 0.01
        lr: 0.0005
        start_lr: 0.0005
        warmup: 0.0
        weight_decay: 0.01
      - final_lr: 0.0
        final_weight_decay: 0.1
        lr: 0.0005
        start_lr: 0.0005
        warmup: 0.0
        weight_decay: 0.1
      - final_lr: 0.0
        final_weight_decay: 0.4
        lr: 0.0005
        start_lr: 0.0005
        warmup: 0.0
        weight_decay: 0.4

      # --- Group 3: 1e-4 ---
      - final_lr: 0.0
        final_weight_decay: 0.01
        lr: 0.0001
        start_lr: 0.0001
        warmup: 0.0
        weight_decay: 0.01
      - final_lr: 0.0
        final_weight_decay: 0.1
        lr: 0.0001
        start_lr: 0.0001
        warmup: 0.0
        weight_decay: 0.1
      - final_lr: 0.0
        final_weight_decay: 0.4
        lr: 0.0001
        start_lr: 0.0001
        warmup: 0.0
        weight_decay: 0.4

# Model configuration
model_kwargs:
  # Pretrained EchoFM checkpoint path
  # Leave empty to use random initialization
  checkpoint: /system/user/publicwork/fallmann/miracle/echofm/checkpoints/echofm.pt

  # Model name (supported: mae_vit_base_patch16, mae_vit_large_patch16)
  model_name: mae_vit_large_patch16

  # Pretrain model kwargs
  pretrain_kwargs:
    img_size: 224
    in_chans: 3
    decoder_embed_dim: 512
    decoder_depth: 8
    decoder_num_heads: 16
    norm_pix_loss: false
    num_frames: 32
    t_patch_size: 4
    sep_pos_embed: true
    cls_embed: true

wandb:
  enabled: true
  project: echofm-probe-eval
  name: echofm-base-4class-probe